name: Detect New Major Order

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:          # lets you trigger it manually too

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for new completed orders
        id: check
        run: node ci-check.js

      - name: Create PR if new order found
        if: steps.check.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="auto/mo-${{ steps.check.outputs.order_number }}-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add index.html .github/last_dispatch_id
          git commit -m "🪖 Auto-detect: Major Order #${{ steps.check.outputs.order_number }} (${{ steps.check.outputs.order_date }})"
          git push origin "$BRANCH"

          gh pr create \
            --title "🪖 MO #${{ steps.check.outputs.order_number }} detected — edit name & merge" \
            --body "$(cat <<'EOF'
          A new completed Major Order was detected from the HD2 dispatch log.

          ## To complete this PR (takes ~30 seconds):

          1. Tap **Files changed** below
          2. Find the new entry in \`index.html\` — it's near the bottom of the \`orders\` array
          3. Edit the \`name\` field — replace \`EDIT THIS — ...\` with a clean short objective description
          4. Tap **Commit changes** → **Commit directly to this branch**
          5. Go back and tap **Merge pull request** ✅

          > The \`enemy\`, \`result\`, \`date\`, and \`note\` fields are auto-filled — double-check them while you're there.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
